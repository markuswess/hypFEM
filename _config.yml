# Book settings
# Learn more at https://jupyterbook.org/customize/config.html

title: Hyperboloidal compactification in NGSolve
author: M. Wess, A. Zenginoglu
  # logo: logo.png
copyright: '2026'
# Cache notebook execution so unchanged notebooks are not rerun on every build.
# See https://jupyterbook.org/content/execute.html
only_build_toc_files: true
execute:
  execute_notebooks: cache
  timeout: 100
  # A publication build must stop instead of rendering a notebook traceback.
  raise_on_error: true

# Define the name of the latex output file for PDF builds
latex:
  latex_documents:
    targetname: book.tex

# Add a bibtex file so that we can create citations
bibtex_bibfiles:
  - references.bib

# Information about where the book exists on the web
repository:
  url: https://github.com/markuswess/hypFEM  # Online location of your book
  path_to_book: .  # Optional path to your book, relative to the repository root
  branch: main  # Which branch of the repository should be used when creating links (optional)

# Add GitHub buttons to your book
# See https://jupyterbook.org/customize/config.html#add-a-link-to-your-repository
html:
  use_issues_button: true
  use_repository_button: true
    #  use_multitoc_numbering: false
parse:
  myst_enable_extensions:
    # don't forget to list any other extensions you want enabled,
    # including those that are enabled by default!
    - amsmath
    - dollarmath
sphinx:
  config:
    # These DOI resolvers redirect correctly but their publisher endpoints
    # reject automated link-check clients with HTTP 403.
    linkcheck_ignore:
    - 'https://doi\.org/10\.1002/1097-0207.*'
    - 'https://doi\.org/10\.1098/rspa\.1962\.0161'
    - 'https://doi\.org/10\.1098/rspa\.1965\.0058'
    - 'https://doi\.org/10\.1103/PhysRevLett\.10\.66'
  extra_extensions:
  - sphinx_proof
  - 'sphinx.ext.autodoc'
